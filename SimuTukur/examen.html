<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050914; color: white; overflow: hidden; height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .chat-bubble { background: rgba(34, 211, 238, 0.05); border: 1px solid rgba(34, 211, 238, 0.1); border-radius: 20px 20px 20px 0; }
        .option-btn:hover { border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .option-selected { border-color: #22d3ee !important; background: rgba(34, 211, 238, 0.1) !important; }
    </style>
</head>
<body>

    <div id="master-container" class="grid-layout">
        
        <aside class="bg-slate-900 border-r border-slate-800 flex flex-col overflow-hidden">
            <div class="p-6 border-b border-slate-800 bg-slate-900/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-cyan-500 flex items-center justify-center shadow-lg shadow-cyan-500/20">
                        <span class="text-xl">🤖</span>
                    </div>
                    <div>
                        <p class="text-[10px] text-cyan-500 font-black uppercase tracking-tighter">Coach SimuTukur</p>
                        <p id="coach-status" class="text-xs font-bold text-slate-300">Analizando nivel...</p>
                    </div>
                </div>
            </div>

            <div id="coach-messages" class="flex-1 overflow-y-auto p-6 space-y-4">
    <div class="chat-bubble p-4 text-[11px] leading-relaxed text-slate-300">
        ¡Bienvenido a tu sesión de entrenamiento! Hoy nos enfocaremos en dominar el nivel 
        <span id="display-nivel" class="text-cyan-400 font-bold">--</span>. 
        Mantén la concentración y analiza bien cada opción.
    </div>
</div>

            <div class="p-6 bg-slate-950 border-t border-slate-800">
                <div class="mb-4">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Cronómetro</p>
                    <h2 id="timer" class="text-3xl font-mono text-slate-400">00:00:00</h2>
                </div>
                <div class="rounded-xl overflow-hidden border border-red-500/30">
                    <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black"></video>
                </div>
            </div>
        </aside>

        <main class="relative overflow-y-auto p-12 bg-[#050914]">
            <div id="loading-overlay" class="absolute inset-0 bg-[#050914] z-50 flex flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-cyan-500 mb-4"></div>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Sincronizando con SimuTukur...</p>
            </div>

            <div id="quiz-ui" class="max-w-3xl mx-auto hidden">
                <header class="mb-12">
                    <span id="label-materia" class="px-3 py-1 bg-cyan-500/10 text-cyan-500 text-[10px] font-black rounded-full uppercase border border-cyan-500/20">Materia</span>
                    <h1 id="txt-pregunta" class="text-2xl font-medium mt-6 leading-relaxed text-slate-100">--</h1>
                </header>

                <div id="opciones-grid" class="space-y-4">
                    </div>

                <footer class="mt-16 pt-8 border-t border-slate-800 flex justify-between items-center">
                    <div>
                        <p id="progreso-txt" class="text-slate-500 text-sm font-bold">Pregunta 1 de 20</p>
                        <p class="text-[10px] text-slate-600 uppercase mt-1">ID Reactivo: <span id="reactivo-id">--</span></p>
                    </div>
                    <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 disabled:text-slate-600 px-12 py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition-all shadow-lg shadow-cyan-900/20">
                        Confirmar
                    </button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://pcuopqvmucmhtcdeswxh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdW9wcXZtdWNtaHRjZGVzd3hoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzg1OTQ1OCwiZXhwIjoyMDg5NDM1NDU4fQ.K5p2k2z8i2mLQhlxsP2voILlos2hELhKbAVPNH2_p30'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const token = params.get('v');
        const nivel = params.get('n') || "1";
        
        let reactivos = [];
        let index = 0;
        let aciertos = 0;
        let seleccionActual = null;

        document.getElementById('display-nivel').innerText = nivel == "1" ? "Principiante" : nivel == "2" ? "Intermedio" : "Avanzado";

        async function init() {
            try {
                // 1. Cámara socio
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = stream;

                // 2. Cargar reactivos (Filtramos por nivel y tipo)
                const { data, error } = await _supabase
                    .from('reactivos')
                    .select('*')
                    .eq('nivel', nivel)
                    .limit(20);

                if (data && data.length > 0) {
                    reactivos = data;
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('quiz-ui').classList.remove('hidden');
                    renderQuestion();
                } else {
                    alert("No hay reactivos para este nivel aún, socio.");
                }
            } catch (err) {
                alert("Socio, activa la cámara para que la IA te valide.");
            }
        }

        function renderQuestion() {
            const r = reactivos[index];
            document.getElementById('label-materia').innerText = r.materia;
            document.getElementById('txt-pregunta').innerText = r.pregunta;
            document.getElementById('progreso-txt').innerText = `Pregunta ${index + 1} de ${reactivos.length}`;
            document.getElementById('reactivo-id').innerText = r.id.split('-')[0];
            
            // Lógica Shuffle: Mezclamos para que no memoricen la A, B, C...
            const opciones = [
                { id: 'A', texto: r.opcion_a },
                { id: 'B', texto: r.opcion_b },
                { id: 'C', texto: r.opcion_c },
                { id: 'D', texto: r.opcion_d }
            ].sort(() => Math.random() - 0.5);

            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = '';
            
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-6 rounded-2xl border border-slate-800 bg-black/20 transition-all flex items-center gap-5 group";
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-bold text-slate-500 group-hover:text-cyan-400 italic">?</span>
                    <span class="text-slate-300 text-sm">${op.texto}</span>
                `;
                btn.onclick = () => {
                    seleccionActual = op.id;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('option-selected'));
                    btn.classList.add('option-selected');
                    document.getElementById('btn-confirm').disabled = false;
                };
                grid.appendChild(btn);
            });
        }

        function procesarRespuesta() {
    const correcto = reactivos[index].respuesta_correcta;
    
    if (seleccionActual === correcto) {
        aciertos++;
        // Mensaje profesional sin la palabra "socio"
        coachHabla("✅ ¡Excelente desempeño! Has demostrado dominio en este tema.");
    } else {
        // Mensaje técnico de análisis de error
        coachHabla(`❌ Respuesta incorrecta. Análisis del error: ${reactivos[index].explicacion_ia}`);
    }

    // Aquí sumamos 1 para que 'renderQuestion()' sepa que debe mostrar la siguiente
    index++; 
    
    seleccionActual = null;
    document.getElementById('btn-confirm').disabled = true;

    if (index < reactivos.length) {
        renderQuestion();
    } else {
        finalizarExamen();
    }
}
            const container = document.getElementById('coach-messages');
            const div = document.createElement('div');
            div.className = "chat-bubble p-4 text-[11px] leading-relaxed text-slate-300 border-l-2 border-cyan-500 bg-cyan-500/5 transition-all";
            div.innerText = texto;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function finalizarExamen() {
            const final = (aciertos / reactivos.length) * 100;
            coachHabla(`🏆 Examen terminado. Lograste un ${final}% de aciertos.`);
            setTimeout(() => {
                window.location.href = `dashboard.html?res=${final}`;
            }, 3000);
        }

        init();
    </script>
</body>
</html>
