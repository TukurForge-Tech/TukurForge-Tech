<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="master-container" class="grid-layout h-screen overflow-hidden">
        <aside class="bg-slate-900 border-r border-slate-800 p-6 md:p-8 flex flex-col gap-6 h-full overflow-y-auto shrink-0">
            <div class="bg-black p-4 rounded-xl border border-slate-800 text-center shadow-inner">
                <p class="text-[10px] md:text-xs text-slate-500 uppercase font-black mb-1 italic">Cronómetro de Sesión</p>
                <h2 id="timer" class="text-3xl md:text-4xl font-mono text-cyan-400 font-bold tracking-tighter">00:00:00</h2>
            </div>
            
            <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black rounded-2xl border border-cyan-500/30 scale-x-[-1]"></video>

            <div class="p-4 bg-slate-950 rounded-xl border border-slate-800">
                <p class="text-[10px] text-slate-600 uppercase font-bold mb-2 italic">Frecuencia de Audio</p>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="audio-fill" class="h-full bg-cyan-500 transition-all duration-100" style="width: 0%;"></div>
                </div>
            </div>

            <div class="mt-auto pt-4 border-t border-slate-800/50">
                <button onclick="confirmarAborto()" class="w-full py-3 border border-red-500/30 text-red-500 text-xs font-black uppercase rounded-lg hover:bg-red-500 hover:text-white transition-all italic tracking-widest shadow-lg shadow-red-500/10">
                    Finalizar Sesión
                </button>
            </div>
        </aside>

        <main class="relative p-4 md:p-6 flex flex-col h-full overflow-hidden">
            
            <div id="panel-lectura" class="hidden w-full h-auto flex-grow max-h-[35vh] bg-black/30 border-b border-slate-800 p-4 overflow-y-auto shadow-inner mb-4 shrink-0">
                <div id="texto-lectura-content" class="text-slate-300 leading-relaxed text-sm md:text-base text-justify whitespace-pre-wrap pb-2"></div>
            </div>

            <div id="panel-preguntas" class="w-full flex-grow flex flex-col overflow-y-auto h-full pr-2">
                <div id="quiz-ui" class="max-w-4xl mx-auto w-full flex-grow flex flex-col h-full">
                    <header class="mb-4 shrink-0 pt-2">
                        <span id="label-materia" class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-[10px] md:text-xs font-black rounded-full border border-cyan-500/20 uppercase italic"></span>
                        <h1 id="txt-pregunta" class="text-base md:text-lg font-bold mt-3 text-slate-100 italic leading-snug">Preparando entorno adaptativo...</h1>
                    </header>
                    
                    <div id="opciones-grid" class="space-y-3 shrink-0 mb-6 pb-2"></div>
                    
                    <footer class="mt-auto pt-4 pb-2 flex justify-between items-center border-t border-slate-800 shrink-0 bg-[#050a14] sticky bottom-0 z-10">
                        <p id="progreso-txt" class="text-slate-500 text-xs font-bold italic uppercase tracking-widest"></p>
                        <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 px-6 py-3 rounded-lg font-bold uppercase text-xs transition-all shadow-lg text-white tracking-widest">Confirmar <i class="fa-solid fa-arrow-right ml-2"></i></button>
                    </footer>
                </div>
            </div>

        </main>
    </div>

    <script src="supabase-client.js"></script>
    <script src="simu-telemetria.js"></script>
    <script src="examen.js"></script>
</body>
</html>
