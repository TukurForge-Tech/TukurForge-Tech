<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento en Curso | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .proctoring-active { border: 2px solid #ef4444; position: relative; }
        .proctoring-active::after { content: "• GRABANDO"; position: absolute; top: 4px; right: 8px; color: #ef4444; font-size: 7px; font-weight: 900; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        body { background-color: #050914; color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen">

    <header class="max-w-6xl mx-auto p-6 flex justify-between items-center bg-[#050914]/90 sticky top-0 z-50 backdrop-blur-md border-b border-slate-800/50">
        <div class="flex items-center gap-6">
            <video id="webcam" autoplay muted playsinline class="w-24 h-24 rounded-2xl bg-black object-cover proctoring-active shadow-2xl shadow-red-900/20"></video>
            <div>
                <h2 id="timer" class="text-3xl font-black text-cyan-500 font-mono">00:00:00</h2>
                <p id="info-hijo" class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">Iniciando sesión segura...</p>
            </div>
        </div>
        <div class="text-right">
            <p id="num-pregunta" class="text-xs font-bold text-slate-400">Preparando examen...</p>
            <div class="w-48 h-1.5 bg-slate-800 rounded-full mt-2 overflow-hidden"><div id="progreso" class="h-full bg-cyan-500 transition-all duration-700" style="width: 0%"></div></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12" id="main-ui">
        <div id="loading-box" class="text-center py-24">
            <div class="animate-spin w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full mx-auto mb-6"></div>
            <p class="text-slate-500 uppercase text-[10px] tracking-widest font-bold">Sincronizando con la red TukurForge...</p>
        </div>

        <div id="quiz-ui" class="hidden">
            <div class="bg-slate-900/40 border border-slate-800/60 p-10 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-10">
                    <span id="materia" class="px-4 py-1.5 bg-cyan-500/10 text-cyan-500 text-[10px] font-black rounded-full uppercase tracking-widest border border-cyan-500/30">MATERIA</span>
                    <span id="nivel-tag" class="text-[9px] text-slate-600 font-bold uppercase tracking-widest italic">Nivel 1: Principiante</span>
                </div>
                
                <h3 id="texto-pregunta" class="text-2xl font-medium leading-relaxed text-slate-200 mb-12">¿Cargando reactivo?</h3>
                
                <div id="grid-opciones" class="grid grid-cols-1 gap-4">
                    </div>
            </div>

            <button id="btn-validar" onclick="validarRespuesta()" disabled class="w-full mt-8 bg-slate-800 text-slate-500 py-5 rounded-2xl font-black uppercase tracking-widest transition-all cursor-not-allowed border border-slate-700/30">
                Confirmar e Ir a la Siguiente
            </button>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'https://pcuopqvmucmhtcdeswxh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdW9wcXZtdWNtaHRjZGVzd3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTk0NTgsImV4cCI6MjA4OTQzNTQ1OH0.g1xfdTtbz4aNW_QF_JcwoM7DCmgRLDxF2Ik48I7fq2M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let reactivos = [];
        let index = 0;
        let seleccion = null;
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('v');

        // Obtener datos del alumno logueado
        const misCursos = JSON.parse(localStorage.getItem('mis_cursos'));
        const cursoActual = misCursos.find(c => c.token_hex === token);
        const alumnoNombre = cursoActual ? cursoActual.nombre_alumno : "Socio";

        document.getElementById('info-hijo').innerText = `Entrenando: ${alumnoNombre}`;

        // 1. Detección de Trampa (Cambio de Pestaña)
        document.addEventListener('visibilitychange', async () => {
            if (document.hidden) {
                await _supabase.from('bitacora_vigilancia').insert({
                    email: localStorage.getItem('session_email'),
                    token_hex: token,
                    nombre_alumno: alumnoNombre,
                    evento: "ALERTA: El alumno salió de la pantalla del examen."
                });
            }
        });

        // 2. Iniciar Cámara y Micrófono
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam').srcObject = stream;
                cargarPreguntas();
            } catch (err) {
                alert("Socio, activa la cámara para poder entrenar.");
                window.location.href = 'dashboard.html';
            }
        }

        // 3. Cargar Reactivos Aleatorios
        async function cargarPreguntas() {
            const { data, error } = await _supabase
                .from('reactivos')
                .select('*')
                .eq('token_hex', token)
                .limit(20);

            if (data && data.length > 0) {
                reactivos = data;
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                renderPregunta();
            }
        }

        function renderPregunta() {
            const r = reactivos[index];
            document.getElementById('materia').innerText = r.materia;
            document.getElementById('texto-pregunta').innerText = r.pregunta;
            document.getElementById('num-pregunta').innerText = `Pregunta ${index + 1} de ${reactivos.length}`;
            
            // ALEATORIZAR OPCIONES
            const ops = [
                { id: 'a', t: r.opcion_a },
                { id: 'b', t: r.opcion_b },
                { id: 'c', t: r.opcion_c },
                { id: 'd', t: r.opcion_d }
            ].sort(() => Math.random() - 0.5);

            const grid = document.getElementById('grid-opciones');
            grid.innerHTML = '';

            ops.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-6 rounded-2xl border border-slate-800 bg-black/30 hover:border-cyan-500 transition-all text-slate-400 hover:text-white flex items-center gap-6 group";
                btn.onclick = () => {
                    seleccion = o.id;
                    document.querySelectorAll('#grid-opciones button').forEach(b => b.classList.remove('border-cyan-500', 'bg-cyan-500/5'));
                    btn.classList.add('border-cyan-500', 'bg-cyan-500/5');
                    const v = document.getElementById('btn-validar');
                    v.disabled = false;
                    v.classList.replace('bg-slate-800', 'bg-cyan-600');
                    v.classList.replace('text-slate-500', 'text-white');
                };
                btn.innerHTML = `<span class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold text-xs group-hover:bg-cyan-500 group-hover:text-black transition-all">?</span> ${o.t}`;
                grid.appendChild(btn);
            });
        }

        initCamera();
    </script>
</body>
</html>
