<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="master-container" class="grid-layout">
        <aside class="bg-slate-900 border-r border-slate-800 p-8 flex flex-col gap-8">
            <div class="bg-black p-5 rounded-xl border border-slate-800 text-center shadow-inner">
                <p class="text-xs text-slate-500 uppercase font-black mb-2 italic">Cronómetro de Sesión</p>
                <h2 id="timer" class="text-4xl font-mono text-cyan-400 font-bold tracking-tighter">00:00:00</h2>
            </div>
            
            <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black rounded-2xl border border-cyan-500/30 scale-x-[-1]"></video>

            <div class="p-5 bg-slate-950 rounded-xl border border-slate-800">
                <p class="text-[10px] sm:text-xs text-slate-600 uppercase font-bold mb-3 italic">Frecuencia de Audio</p>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="audio-fill"></div>
                </div>
            </div>

            <div class="mt-auto">
                <button onclick="confirmarAborto()" class="w-full py-4 border border-red-500/30 text-red-500 text-sm font-black uppercase rounded-lg hover:bg-red-500 hover:text-white transition-all italic">
                    Finalizar Sesión
                </button>
            </div>
        </aside>

        <main class="relative p-12 md:p-16 overflow-y-auto">
            <div id="quiz-ui" class="max-w-4xl mx-auto">
                <header class="mb-12">
                    <span id="label-materia" class="px-4 py-2 bg-cyan-500/10 text-cyan-400 text-xs font-black rounded-full border border-cyan-500/20 uppercase italic"></span>
                    <h1 id="txt-pregunta" class="text-3xl md:text-4xl font-bold mt-8 text-slate-100 italic leading-snug">Preparando reactivos...</h1>
                </header>
                <div id="opciones-grid" class="space-y-5"></div>
                <footer class="mt-20 pt-8 border-t border-slate-800 flex justify-between items-center">
                    <p id="progreso-txt" class="text-slate-500 text-sm font-bold italic uppercase"></p>
                    <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 px-12 py-5 rounded-xl font-bold uppercase text-sm transition-all shadow-lg">Confirmar Respuesta</button>
                </footer>
            </div>
        </main>
    </div>

    <script src="supabase-client.js"></script>
    <script src="simu-telemetria.js"></script>
    <script src="examen.js"></script>
</body>
</html>
