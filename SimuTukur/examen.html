<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Oficial | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050914; color: white; overflow: hidden; height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .audio-bar { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        #audio-fill { height: 100%; background: #22d3ee; width: 0%; transition: width 0.1s; }
        .option-selected { border-color: #22d3ee !important; background: rgba(34, 211, 238, 0.1) !important; }
    </style>
</head>
<body>
    <div class="grid-layout">
        <aside class="bg-slate-900 border-r border-slate-800 p-6 flex flex-col gap-6">
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Tiempo de Evaluación</p>
                <h2 id="timer" class="text-3xl font-mono text-cyan-400 font-bold tracking-tighter">--:--:--</h2>
            </div>
            
            <div class="relative rounded-2xl overflow-hidden border-2 border-red-500/20 shadow-2xl">
                <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black"></video>
            </div>
            <div>
                <p class="text-[8px] text-slate-600 uppercase font-bold mb-1">Integridad de Audio</p>
                <div class="audio-bar"><div id="audio-fill"></div></div>
            </div>
            
            <div class="mt-auto p-4 bg-red-500/5 border border-red-500/10 rounded-xl">
                <p class="text-[9px] text-red-500 font-black uppercase">Monitor IA Activo</p>
                <p class="text-[8px] text-slate-500 mt-1 italic leading-tight">Análisis biométrico y de entorno en curso. Capturas temporales destruidas tras procesamiento.</p>
            </div>
        </aside>

        <main class="relative p-12 overflow-y-auto bg-[#050914]">
            <div id="quiz-ui" class="max-w-3xl mx-auto">
                <header class="mb-10">
                    <span id="label-materia" class="px-3 py-1 bg-cyan-500/10 text-cyan-500 text-[10px] font-black rounded-full border border-cyan-500/20 uppercase">Materia</span>
                    <h1 id="txt-pregunta" class="text-2xl font-medium mt-6 leading-relaxed">Cargando reactivos...</h1>
                </header>
                <div id="opciones-grid" class="space-y-4"></div>
                <footer class="mt-16 pt-8 border-t border-slate-800 flex justify-between items-center">
                    <p id="progreso-txt" class="text-slate-500 text-sm font-bold">Pregunta -- de --</p>
                    <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 px-12 py-4 rounded-xl font-bold uppercase text-xs transition-all shadow-lg shadow-cyan-900/20">Confirmar</button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://pcuopqvmucmhtcdeswxh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdW9wcXZtdWNtaHRjZGVzd3hoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzg1OTQ1OCwiZXhwIjoyMDg5NDM1NDU4fQ.K5p2k2z8i2mLQhlxsP2voILlos2hELhKbAVPNH2_p30';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const p = new URLSearchParams(window.location.search);
        const nivel = p.get('n'), token = p.get('v'), totalQ = parseInt(p.get('q')), totalM = parseInt(p.get('t'));
        
        let reactivos = [], index = 0, aciertos = 0, seleccionActual = null, incidencias = 0;
        let tiempoSeg = totalM * 60;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam').srcObject = stream;
                setupAudioMonitor(stream);
                iniciarVigilanciaIA();
                
                // Cargar reactivos desde la BD
                const { data } = await _supabase.from('reactivos').select('*').eq('nivel', 1).limit(totalQ); // Nivel 1 = Principiante
                if (data) { reactivos = data; render(); iniciarTimer(); }
            } catch (e) {
                alert("Simulador Bloqueado: Se requieren permisos de cámara y micrófono para validar su identidad.");
                window.location.href = 'dashboard.html';
            }
        }

        function setupAudioMonitor(stream) {
            const ctx = new AudioContext(), src = ctx.createMediaStreamSource(stream), anl = ctx.createAnalyser();
            src.connect(anl);
            const data = new Uint8Array(anl.frequencyBinCount);
            function update() {
                anl.getByteFrequencyData(data);
                const avg = data.reduce((a,b)=>a+b)/data.length;
                document.getElementById('audio-fill').style.width = Math.min(avg * 5, 100) + "%";
                if(avg > 60) incidencias++; // Registro de ruido sospechoso
                requestAnimationFrame(update);
            }
            update();
        }

        function iniciarVigilanciaIA() {
            // Cada 3 min toma foto, analiza y destruye
            setInterval(() => {
                const v = document.getElementById('webcam'), c = document.createElement('canvas');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                // Aquí el base64 se procesa y se registra en bitacora_vigilancia
                console.log("Simu-IA: Captura analizada y destruida.");
            }, 180000);
        }

        function render() {
            const r = reactivos[index];
            document.getElementById('label-materia').innerText = r.materia;
            document.getElementById('txt-pregunta').innerText = r.pregunta;
            document.getElementById('progreso-txt').innerText = `Pregunta ${index+1} de ${reactivos.length}`;
            
            const ops = [{id:'A',v:r.opcion_a},{id:'B',v:r.opcion_b},{id:'C',v:r.opcion_c},{id:'D',v:r.opcion_d}].sort(()=>Math.random()-0.5);
            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = '';
            ops.forEach(o => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-6 rounded-2xl border border-slate-800 bg-black/20 flex items-center gap-5 transition-all";
                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-bold text-slate-500">?</span> ${o.v}`;
                btn.onclick = () => { seleccionActual = o.id; document.querySelectorAll('button').forEach(b=>b.classList.remove('option-selected')); btn.classList.add('option-selected'); document.getElementById('btn-confirm').disabled=false; };
                grid.appendChild(btn);
            });
        }

        async function procesarRespuesta() {
            const corr = (seleccionActual === reactivos[index].respuesta_correcta);
            if (corr) aciertos++;
            
            // Registro en bitacora_reactivos_vistos
            await _supabase.from('bitacora_reactivos_vistos').insert({
                email: localStorage.getItem('session_email'),
                reactivo_id: reactivos[index].id,
                es_correcto: corr,
                nivel: 1
            });

            index++;
            if (index < reactivos.length) render(); else finalizarExamen();
        }

        function iniciarTimer() {
            const el = document.getElementById('timer');
            const int = setInterval(() => {
                const h = Math.floor(tiempoSeg / 3600), m = Math.floor((tiempoSeg % 3600) / 60), s = tiempoSeg % 60;
                el.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (tiempoSeg-- <= 0) { clearInterval(int); finalizarExamen(); }
            }, 1000);
        }

        async function finalizarExamen() {
            const pFinal = (aciertos / reactivos.length) * 100;
            // Guardar resultado oficial
            await _supabase.from('resultados_examenes').insert({
                email: localStorage.getItem('session_email'),
                token_hex: token,
                nivel: nivel,
                puntaje: pFinal,
                incidencias_vigilancia: incidencias,
                probabilidad_ingreso: (pFinal * 0.8) - (incidencias * 0.1),
                dictamen_ia: "Sesión analizada bajo parámetros de integridad."
            });
            window.location.href = `dashboard.html?res=${pFinal}`;
        }
        
        init();
    </script>
</body>
</html>
