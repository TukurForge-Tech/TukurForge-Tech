<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050914; color: white; overflow: hidden; height: 100vh; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .option-btn:hover { border-color: #22d3ee; background: rgba(34, 211, 238, 0.05); }
        .option-selected { border-color: #22d3ee !important; background: rgba(34, 211, 238, 0.1) !important; }
    </style>
</head>
<body>
    <div id="master-container" class="grid-layout">
        <aside class="bg-slate-900 border-r border-slate-800 p-6 flex flex-col gap-8">
            <div id="timer-box">
                <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Tiempo Restante</p>
                <h2 id="timer" class="text-4xl font-mono text-cyan-400 font-bold text-center bg-slate-950 py-4 rounded-xl border border-slate-800">03:00:00</h2>
            </div>
            <div class="rounded-2xl overflow-hidden border-2 border-red-500/20 shadow-2xl">
                <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black"></video>
            </div>
            <div class="mt-auto pt-6 border-t border-slate-800">
                <p class="text-[10px] text-slate-600 uppercase font-black">ID SESIÓN: TUKUR-2026</p>
            </div>
        </aside>

        <main class="relative overflow-y-auto p-12 bg-[#050914]">
            <div id="loading-overlay" class="absolute inset-0 bg-[#050914] z-50 flex flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-cyan-500 mb-4"></div>
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Cargando Reactivos...</p>
            </div>
            <div id="quiz-ui" class="max-w-3xl mx-auto hidden">
                <header class="mb-12">
                    <span id="label-materia" class="px-3 py-1 bg-cyan-500/10 text-cyan-500 text-[10px] font-black rounded-full uppercase border border-cyan-500/20">Materia</span>
                    <h1 id="txt-pregunta" class="text-2xl font-medium mt-6 leading-relaxed text-slate-100">Cargando...</h1>
                </header>
                <div id="opciones-grid" class="space-y-4"></div>
                <footer class="mt-16 pt-8 border-t border-slate-800 flex justify-between items-center">
                    <div>
                        <p id="progreso-txt" class="text-slate-500 text-sm font-bold">Pregunta 1 de 20</p>
                    </div>
                    <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 disabled:text-slate-600 px-12 py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition-all">Confirmar</button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://pcuopqvmucmhtcdeswxh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjdW9wcXZtdWNtaHRjZGVzd3hoIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Mzg1OTQ1OCwiZXhwIjoyMDg5NDM1NDU4fQ.K5p2k2z8i2mLQhlxsP2voILlos2hELhKbAVPNH2_p30'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const token = params.get('v');
        const nivel = params.get('n') || "1";
        
        let reactivos = [], index = 0, aciertos = 0, seleccionActual = null;
        let tiempoRestante = 180 * 60; // 3 horas

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam').srcObject = stream;
                const { data } = await _supabase.from('reactivos').select('*').eq('nivel', nivel).limit(20);
                if (data && data.length > 0) {
                    reactivos = data;
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('quiz-ui').classList.remove('hidden');
                    renderQuestion();
                    iniciarTimer();
                }
            } catch (err) { alert("Active la cámara para iniciar."); }
        }

        function iniciarTimer() {
            const el = document.getElementById('timer');
            const int = setInterval(() => {
                const h = Math.floor(tiempoRestante / 3600), m = Math.floor((tiempoRestante % 3600) / 60), s = tiempoRestante % 60;
                el.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (tiempoRestante-- <= 0) { clearInterval(int); finalizarExamen(); }
            }, 1000);
        }

        function renderQuestion() {
            const r = reactivos[index];
            document.getElementById('label-materia').innerText = r.materia;
            document.getElementById('txt-pregunta').innerText = r.pregunta;
            document.getElementById('progreso-txt').innerText = `Pregunta ${index+1} de ${reactivos.length}`;
            const ops = [{id:'A',t:r.opcion_a},{id:'B',t:r.opcion_b},{id:'C',t:r.opcion_c},{id:'D',t:r.opcion_d}].sort(()=>Math.random()-0.5);
            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = '';
            ops.forEach(op => {
                const btn = document.createElement('button');
                btn.className="option-btn w-full text-left p-6 rounded-2xl border border-slate-800 bg-black/20 flex items-center gap-5";
                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-[10px] font-bold">?</span> ${op.t}`;
                btn.onclick = () => { seleccionActual = op.id; document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('option-selected')); btn.classList.add('option-selected'); document.getElementById('btn-confirm').disabled=false; };
                grid.appendChild(btn);
            });
        }

        function procesarRespuesta() {
            if (seleccionActual === reactivos[index].respuesta_correcta) aciertos++;
            index++; seleccionActual = null; document.getElementById('btn-confirm').disabled = true;
            if (index < reactivos.length) renderQuestion(); else finalizarExamen();
        }

        function finalizarExamen() {
            const res = (aciertos / reactivos.length) * 100;
            window.location.href = `dashboard.html?res=${res}&v=${token}`;
        }
        init();
    </script>
</body>
</html>
