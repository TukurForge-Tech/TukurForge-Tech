<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="master-container" class="grid-layout h-screen overflow-hidden">
        <aside class="bg-slate-900 border-r border-slate-800 p-8 flex flex-col gap-8 h-full overflow-y-auto">
            <div class="bg-black p-5 rounded-xl border border-slate-800 text-center shadow-inner">
                <p class="text-xs text-slate-500 uppercase font-black mb-2 italic">Cronómetro de Sesión</p>
                <h2 id="timer" class="text-4xl font-mono text-cyan-400 font-bold tracking-tighter">00:00:00</h2>
            </div>
            
            <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black rounded-2xl border border-cyan-500/30 scale-x-[-1]"></video>

            <div class="p-5 bg-slate-950 rounded-xl border border-slate-800">
                <p class="text-[10px] sm:text-xs text-slate-600 uppercase font-bold mb-3 italic">Frecuencia de Audio</p>
                <div class="h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="audio-fill" class="h-full bg-cyan-500 transition-all duration-100" style="width: 0%;"></div>
                </div>
            </div>

            <div class="mt-auto">
                <button onclick="confirmarAborto()" class="w-full py-4 border border-red-500/30 text-red-500 text-sm font-black uppercase rounded-lg hover:bg-red-500 hover:text-white transition-all italic">
                    Finalizar Sesión
                </button>
            </div>
        </aside>

        <main class="relative p-6 md:p-10 flex flex-col md:flex-row gap-8 h-full overflow-hidden">
            
            <div id="panel-lectura" class="hidden w-full md:w-1/2 h-full bg-slate-900/40 border border-slate-800 rounded-2xl p-6 md:p-8 overflow-y-auto shadow-inner flex flex-col">
                <div class="sticky top-0 bg-[#050a14] pb-4 border-b border-slate-800 mb-4 z-10">
                    <h3 class="text-cyan-400 font-bold uppercase tracking-widest text-xs italic flex items-center gap-2">
                        <i class="fa-solid fa-book-open"></i> Texto de Referencia
                    </h3>
                </div>
                <div id="texto-lectura-content" class="text-slate-300 leading-relaxed text-sm md:text-base text-justify whitespace-pre-wrap pb-10"></div>
            </div>

            <div id="panel-preguntas" class="w-full h-full flex flex-col overflow-y-auto pr-2">
                <div id="quiz-ui" class="max-w-3xl mx-auto w-full flex-grow flex flex-col">
                    <header class="mb-8 shrink-0">
                        <span id="label-materia" class="px-4 py-2 bg-cyan-500/10 text-cyan-400 text-xs font-black rounded-full border border-cyan-500/20 uppercase italic"></span>
                        <h1 id="txt-pregunta" class="text-2xl md:text-3xl font-bold mt-6 text-slate-100 italic leading-snug">Preparando entorno adaptativo...</h1>
                    </header>
                    
                    <div id="opciones-grid" class="space-y-4 shrink-0"></div>
                    
                    <footer class="mt-auto pt-8 pb-4 flex justify-between items-center border-t border-slate-800 shrink-0">
                        <p id="progreso-txt" class="text-slate-500 text-sm font-bold italic uppercase tracking-widest"></p>
                        <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 px-8 py-4 rounded-xl font-bold uppercase text-sm transition-all shadow-lg text-white">Confirmar <i class="fa-solid fa-arrow-right ml-2"></i></button>
                    </footer>
                </div>
            </div>

        </main>
    </div>

    <script src="supabase-client.js"></script>
    <script src="simu-telemetria.js"></script>
    <script src="examen.js"></script>
</body>
</html>
