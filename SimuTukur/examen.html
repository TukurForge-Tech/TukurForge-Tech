<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Oficial | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <style>
        body { background-color: #050914; color: white; overflow: hidden; height: 100vh; font-family: sans-serif; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        .option-selected { border-color: #00f2ff !important; background: rgba(0, 242, 255, 0.1) !important; }
    </style>
</head>
<body>
    <div id="master-container" class="grid-layout">
        <aside class="bg-slate-900 border-r border-slate-800 p-6 flex flex-col gap-6">
            <div class="bg-black p-4 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-1 italic">Cronómetro de Sesión</p>
                <h2 id="timer" class="text-3xl font-mono text-cyan-400 font-bold tracking-tighter">00:00:00</h2>
            </div>
            <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover bg-black rounded-2xl border border-cyan-500/30 scale-x-[-1]"></video>
            <div class="mt-auto p-4 bg-red-500/5 border border-red-500/10 rounded-xl">
                <p class="text-[9px] text-red-500 font-black uppercase tracking-widest italic">Monitor IA Activo</p>
            </div>
        </aside>

        <main class="relative p-12 overflow-y-auto">
            <div id="quiz-ui" class="max-w-3xl mx-auto">
                <header class="mb-12">
                    <span id="label-materia" class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-[10px] font-black rounded-full border border-cyan-500/20 uppercase italic">Cargando...</span>
                    <h1 id="txt-pregunta" class="text-2xl font-bold mt-8 text-slate-100 italic">Preparando reactivos...</h1>
                </header>
                <div id="opciones-grid" class="space-y-4"></div>
                <footer class="mt-16 pt-8 border-t border-slate-800 flex justify-between items-center">
                    <p id="progreso-txt" class="text-slate-500 text-xs font-bold italic uppercase">Pregunta -- de --</p>
                    <button id="btn-confirm" onclick="procesarRespuesta()" disabled class="bg-cyan-600 hover:bg-cyan-500 disabled:bg-slate-800 px-10 py-4 rounded-xl font-bold uppercase text-[10px] transition-all">Confirmar Respuesta</button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nivel = params.get('n'), token = params.get('v'), cantQ = parseInt(params.get('q')) || 40, mins = parseInt(params.get('t')) || 60;
        let reactivos = [], index = 0, aciertos = 0, seleccionActual = null, tiempoSeg = mins * 60;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam').srcObject = stream;
                
                const plan = localStorage.getItem('plan_actual');
                const nivelID = (nivel === "Principiante") ? 1 : (nivel === "Medio") ? 2 : 3;

                // LÓGICA DE FILTRO: UNAM (General + Área) o ECOEMS (Base)
                let tipos = plan.includes("UNAM") ? ['UNAM_GENERAL', plan.split(' ')[1]] : [plan.split(' ')[0]];

                const { data, error } = await _supabase.from('reactivos').select('*').in('tipo_examen', tipos).eq('nivel', nivelID).limit(cantQ);

                if (data && data.length > 0) { reactivos = data.sort(() => Math.random() - 0.5); render(); startTimer(); }
                else { alert("No hay reactivos para " + plan); window.location.href = 'dashboard.html'; }
            } catch (e) { window.location.href = 'dashboard.html'; }
        }

        // examen.html - Función Render Corregida
        function render() {
            const r = reactivos[index];
            // MOSTRAR TÍTULO DEL EXAMEN (Línea 90 aprox)
            const plan = localStorage.getItem('plan_actual');
            document.getElementById('label-materia').innerText = `${plan} | ${r.materia}`;
            
            document.getElementById('txt-pregunta').innerText = r.pregunta;
            document.getElementById('progreso-txt').innerText = `REACTIVO ${index + 1} DE ${reactivos.length}`;
            
            const g = document.getElementById('opciones-grid');
            g.innerHTML = '';
            
            const ops = [
                {id: 'a', v: r.opcion_a, letra: 'A'}, 
                {id: 'b', v: r.opcion_b, letra: 'B'}, 
                {id: 'c', v: r.opcion_c, letra: 'C'}, 
                {id: 'd', v: r.opcion_d, letra: 'D'}
            ].sort(() => Math.random() - 0.5);
        
            ops.forEach(o => {
                const b = document.createElement('button');
                // ETIQUETA DE LETRA CORREGIDA
                b.className = "w-full text-left p-5 rounded-xl border border-slate-800 bg-slate-900/50 flex items-center gap-4 transition-all text-sm italic hover:border-cyan-500";
                b.innerHTML = `
                    <span class="w-8 h-8 rounded-lg bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-[11px] font-black text-cyan-400">
                        ${o.letra}
                    </span> 
                    <span class="text-slate-200">${o.v}</span>
                `;
                b.onclick = () => {
                    seleccionActual = o.id;
                    document.querySelectorAll('#opciones-grid button').forEach(x => x.classList.remove('option-selected'));
                    b.classList.add('option-selected');
                    document.getElementById('btn-confirm').disabled = false;
                };
                g.appendChild(b);
            });
        }

        async function procesarRespuesta() {
            if (seleccionActual === reactivos[index].respuesta_correcta) aciertos++;
            index++; if (index < reactivos.length) render(); else finalizar();
        }

        function startTimer() {
            setInterval(() => {
                const h = Math.floor(tiempoSeg / 3600), m = Math.floor((tiempoSeg % 3600) / 60), s = tiempoSeg % 60;
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (tiempoSeg-- <= 0) finalizar();
            }, 1000);
        }

        async function finalizar() {
            const p = ((aciertos / reactivos.length) * 100).toFixed(2);
            await _supabase.from('resultados_examenes').insert({ email: localStorage.getItem('session_email'), token_hex: token, nivel, puntaje: p });
            window.location.href = `dashboard.html?res=${p}`;
        }
        init();
    </script>
</body>
</html>
