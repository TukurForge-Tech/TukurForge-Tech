<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Unificado | SimuTukur</title>
    <link rel="icon" type="image/jpeg" href="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#050a14]">
    
    <div id="login-box" class="card-glass w-full max-w-md p-8 md:p-10 relative overflow-hidden bg-gray-900 shadow-2xl rounded-2xl border border-gray-800">
        
        <div class="text-center mb-10">
            <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg" class="w-16 h-16 mx-auto rounded-xl border border-cyan-500/30 mb-4" alt="Simu Logo">
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Acceso <span class="text-cyan-400">Aspirantes</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest mt-2 font-bold">Ingresa tus credenciales</p>
        </div>

        <div id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Usuario (Correo Electrónico)</label>
                <input type="email" id="email" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-sm text-white outline-none focus:border-cyan-500 transition" placeholder="ejemplo@correo.com">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-4 pr-12 text-sm text-white outline-none focus:border-cyan-500 transition">
                    <i class="fa-solid fa-eye password-toggle absolute right-4 top-4 cursor-pointer text-gray-500 hover:text-cyan-400" id="togglePassword"></i>
                </div>
            </div>

            <div class="text-right mt-1 mb-4">
                <button type="button" onclick="document.getElementById('modal-recuperar').classList.remove('hidden')" class="text-xs text-cyan-400 hover:text-cyan-300 font-bold">¿Olvidaste tu contraseña?</button>
            </div>
            
            <button type="button" id="btnIngresar" onclick="procesarLogin()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl transition uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                Iniciar Sesión
            </button>
            <p id="msg" class="text-center text-xs mt-4 font-bold tracking-widest uppercase h-4"></p>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <a href="registro.html" class="text-xs text-gray-500 hover:text-white uppercase font-bold tracking-widest transition">¿No tienes cuenta? <span class="text-cyan-400">Inscríbete aquí</span></a>
        </div>
    </div>

    <div id="splash-screen" class="hidden flex-col fixed inset-0 bg-black z-[9999] justify-center items-center">
        <video id="splash-video" width="100%" height="100%" muted playsinline style="object-fit: contain; max-width: 100vw; max-height: 100vh;">
            <source src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.mp4" type="video/mp4">
        </video>
        <p class="absolute bottom-10 text-cyan-500 text-xs uppercase tracking-widest font-bold animate-pulse w-full text-center">Iniciando Biometría y Tutor IA...</p>
    </div>

    <div id="modal-recuperar" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-900 border border-cyan-500/30 p-8 rounded-2xl max-w-sm w-full text-center relative shadow-[0_0_30px_rgba(6,182,212,0.2)]">
            <button onclick="document.getElementById('modal-recuperar').classList.add('hidden')" class="absolute top-4 right-4 text-gray-500 hover:text-white text-2xl">&times;</button>
            <i class="fa-solid fa-lock-open text-4xl text-cyan-400 mb-4"></i>
            <h3 class="text-xl font-bold text-white mb-2">Recuperar Acceso</h3>
            <p class="text-xs text-gray-400 mb-6">Ingresa el correo con el que te registraste y te enviaremos una nueva contraseña segura.</p>
            
            <input type="email" id="email-recuperar" placeholder="tu@correo.com" class="w-full bg-black/50 border border-slate-700 rounded-lg p-3 text-white text-sm focus:border-cyan-500 outline-none mb-4">
            
            <button id="btn-enviar-recuperacion" onclick="procesarRecuperacion()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg text-sm transition-all">
                <i id="icono-recuperar" class="fa-solid fa-paper-plane mr-2"></i> Enviar Contraseña
            </button>
            <p id="msg-recuperar" class="text-xs mt-4 hidden font-bold"></p>
        </div>
    </div>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="login.js"></script>
</body>
</html>
