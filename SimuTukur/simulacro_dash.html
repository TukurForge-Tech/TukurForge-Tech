<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Piloto | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .locked { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        .neon-border { border: 2px solid #06b6d4; box-shadow: 0 0 15px #06b6d4; }
    </style>
</head>
<body class="bg-[#050a14] text-white font-sans">
    <div class="max-w-4xl mx-auto py-10 px-6">
        <header class="flex justify-between items-center mb-12">
            <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg" class="w-12 rounded-lg">
            <div class="text-right">
                <p id="user-display" class="text-cyan-400 font-black italic uppercase">Validando Aspirante...</p>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Tokens de Energía: <span id="tokens">2</span> ⚡</p>
            </div>
        </header>

        <h2 class="text-4xl font-black italic mb-8 uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">
            Centro de Evaluaciones
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-black/40 border-2 border-cyan-500 p-6 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 bg-cyan-500 text-black text-[10px] font-black px-4 py-1 rounded-bl-xl uppercase animate-pulse">Activo Ahora</div>
                <h3 class="text-2xl font-black italic mb-2 uppercase">Gran Simulacro Piloto ECOEMS</h3>
                <p class="text-gray-400 text-xs mb-6 uppercase">60 Reactivos Proporcionales | Complejidad Media-Alta | 90 Minutos</p>
                <button onclick="iniciarSimulacro()" class="w-full bg-cyan-600 hover:bg-cyan-400 text-white font-black py-4 rounded-xl uppercase transition-all transform hover:scale-105">
                    Comenzar Evaluación
                </button>
            </div>

            <div class="locked bg-black/20 border border-white/10 p-6 rounded-3xl relative">
                <i class="fa-solid fa-lock absolute top-4 right-4 text-gray-600"></i>
                <h3 class="text-xl font-bold italic mb-2 uppercase text-gray-500">Banco de Reactivos</h3>
                <p class="text-[10px] uppercase text-gray-600">Disponible solo en cuenta PRO</p>
            </div>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script src="simulacro_dash.js"></script>
</body>
</html>
