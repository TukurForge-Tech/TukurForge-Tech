<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones | SimuTukur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="p-6 flex flex-col gap-4 border-b border-gray-800 bg-[#050a14]">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic color-cian tracking-tighter">SIMUTUKUR</h1>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 bg-gray-900 border border-cyan-900/50 rounded-lg p-2 px-4">
                    <i class="fa-solid fa-bolt text-yellow-400"></i>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold leading-none">Energía IA</p>
                        <p id="creditos-display" class="text-sm font-black text-white leading-none mt-1">--</p>
                    </div>
                    <button onclick="simularCompra()" class="ml-3 bg-cyan-600 hover:bg-cyan-500 text-white text-[10px] font-black py-1 px-3 rounded uppercase">Comprar</button>
                </div>
                
                <button onclick="cerrarSesion()" class="text-red-500 font-bold hover:text-red-400 text-xs uppercase tracking-widest">Cerrar Sesión</button>
            </div>
        </div>
        <div id="pestanas-cursos" class="flex gap-3 overflow-x-auto pb-2"></div>
    </header>

    <main class="grid grid-cols-12 h-[calc(100vh-140px)]">
        <aside class="col-span-3 border-r border-gray-800 p-6 flex flex-col bg-black/20">
            <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-6 italic">Línea del Tiempo</h3>
            <div id="contenedor-historial" class="flex-grow overflow-y-auto space-y-4 pr-2"></div>
        </aside>

        <section class="col-span-6 p-8 flex flex-col h-full bg-[#050a14]">
            <div id="info-usuario" class="mb-6">
                <h2 id="saludo-alumno" class="text-4xl font-black italic tracking-tighter">Hola, <span class="color-cian italic">Cargando...</span></h2>
                <div id="plan-actual-container" class="mt-3"></div>
            </div>

            <div class="card-glass flex-grow flex flex-col overflow-hidden">
                <div class="p-4 border-b border-white/5 bg-white/5 flex items-center gap-3">
                    <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg" class="w-20 h-20 rounded" alt="Simu">
                    <span class="text-xs font-black uppercase color-cian italic">Asistente IA Simu</span>
                </div>
                <div id="chat-box" class="flex-grow p-6 overflow-y-auto text-sm text-gray-300 space-y-4">
                    <p class="bg-gray-800/40 p-5 rounded-2xl rounded-tl-none border border-white/5 max-w-[85%] leading-relaxed">
                        Sesión iniciada. Seleccione una pestaña superior para cargar el entrenamiento correspondiente.
                    </p>
                </div>
                <div class="p-5 border-t border-white/5 bg-black/40">
                    <div class="flex gap-3 bg-gray-900 border border-white/10 rounded-xl p-3">
                        <input type="text" id="user-input" placeholder="Pregunte algo a Simu..." class="bg-transparent flex-grow text-sm p-2 outline-none">
                        <button onclick="procesarEnvioChat()" class="bg-cyan-600 p-3 px-6 rounded-lg text-xs font-bold uppercase hover:bg-cyan-500 transition-colors">Enviar</button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="col-span-3 p-6 border-l border-gray-800 bg-black/20 overflow-y-auto">
            <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-6 italic">Entrenamientos</h3>
            <div id="contenedor-niveles" class="space-y-5"></div>
        </aside>
    </main>

    <script src="supabase-client.js"></script>
    <script src="simu-telemetria.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
