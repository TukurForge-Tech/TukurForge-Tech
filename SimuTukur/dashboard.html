<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a14; color: white; font-family: 'Segoe UI', sans-serif; }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }
        .color-cian { color: #00f2ff; }
        .btn-perfil { transition: all 0.3s ease; border: 1px solid #00f2ff; color: #00f2ff; }
        .btn-perfil:hover { background: #00f2ff; color: #050a14; box-shadow: 0 0 15px #00f2ff; }
        .nivel-card { transition: transform 0.2s; cursor: pointer; }
        .nivel-card:hover:not(.locked) { transform: scale(1.02); background: rgba(0, 242, 255, 0.05); }
        .locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center border-b border-gray-800">
        <h1 class="text-3xl font-black italic color-cian tracking-tighter">SIMUTUKUR</h1>
        
        <div class="flex gap-4 items-center">
            <button onclick="cambiarEntrenamiento()" class="btn-perfil px-4 py-2 rounded-lg font-bold text-sm uppercase">
                <i class="fa-solid fa-arrows-rotate mr-2"></i> Cambiar Perfil
            </button>
            <button onclick="cerrarSesion()" class="text-red-500 font-bold hover:text-red-400 text-sm uppercase tracking-widest">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 grid grid-cols-12 gap-8">
        
        <aside class="col-span-3">
            <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-4">Historial de este plan</h3>
            <div id="historial-vacio" class="card-glass p-6 text-sm text-gray-400 italic">
                Sin registros previos.
            </div>
        </aside>

        <section class="col-span-6">
            <div id="info-usuario" class="mb-8">
                </div>

            <div class="card-glass p-8 flex flex-col items-center justify-center min-h-[300px]">
                <div class="flex items-center gap-4 mb-6 bg-gray-900/50 p-4 rounded-xl border border-gray-700 w-full">
                    <img src="https://simutukur.tukurforge.com/logo_bho.png" class="w-12 h-12 rounded-lg" alt="Simu">
                    <p class="text-gray-300 text-sm italic leading-relaxed" id="msj-simu">
                        Cargando configuración de entrenamiento...
                    </p>
                </div>
                <div class="mt-auto w-full border-t border-gray-800 pt-6 text-center">
                    <p class="text-xs text-gray-500 italic">Consulte su plan de mejora con Simu...</p>
                </div>
            </div>
        </section>

        <aside class="col-span-3">
            <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-4">Niveles Disponibles</h3>
            <div id="contenedor-niveles" class="space-y-4">
                </div>
        </aside>

    </main>

    <script>
        // La variable "_supabase" ya está disponible porque cargamos "supabase-client.js" arriba

        async function cargarDashboard() {
            // Usamos la lógica centralizada de token
            const tokenHex = localStorage.getItem('token_hex');
            const nombreAlumno = localStorage.getItem('nombre_alumno') || "Aspirante";

            if (!tokenHex || tokenHex === "null") {
                console.warn("Sesión no válida, regresando al inicio.");
                window.location.href = 'index.html'; 
                return;
            }

            try {
                // 1. Obtener Institución y Área
                const { data: config, error: errConfig } = await _supabase
                    .from('config_examenes')
                    .select('institucion, area')
                    .eq('token_hex', tokenHex)
                    .single();

                if (errConfig) throw errConfig;

                const nombreInstitucionFull = config.area ? `${config.institucion} ${config.area}` : config.institucion;

                // 2. UI: Nombre Grande y Plan (Sin Token interno)
                document.getElementById('info-usuario').innerHTML = `
                    <h2 class="text-5xl font-black italic mb-2 tracking-tighter">Hola, <span class="color-cian">${nombreAlumno}</span></h2>
                    <p class="text-2xl font-bold uppercase text-gray-400">Plan: <span class="text-white">${nombreInstitucionFull}</span></p>
                `;
                document.getElementById('msj-simu').innerText = `Bienvenido. Inicie su evaluación de nivel Principiante para ${nombreInstitucionFull}.`;

                // 3. Obtener Niveles desde reglas_simulador
                const { data: niveles, error: errNiveles } = await _supabase
                    .from('reglas_simulador')
                    .select('*')
                    .eq('institucion', nombreInstitucionFull)
                    .order('id', { ascending: true });

                if (errNiveles) throw errNiveles;

                const contenedor = document.getElementById('contenedor-niveles');
                contenedor.innerHTML = "";

                niveles.forEach(n => {
                    const isLocked = n.nivel !== 'Principiante'; 

                    contenedor.innerHTML += `
                        <div class="card-glass p-4 nivel-card ${isLocked ? 'locked' : ''}" 
                             onclick="${isLocked ? "alert('Nivel bloqueado. Complete el anterior.')" : `iniciarEntrenamiento('${n.nivel}', '${nombreInstitucionFull}')`}">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="color-cian font-bold text-xs uppercase tracking-tighter">${n.nivel}</h4>
                                <i class="fa-solid ${isLocked ? 'fa-lock' : 'fa-lock-open'} text-[10px]"></i>
                            </div>
                            <p class="text-lg font-bold">${n.cantidad_preguntas} Reactivos | ${n.tiempo_minutos} Min</p>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error en Dashboard:", error.message);
                // Si la base de datos falla o el token es inválido:
                // window.location.href = 'index.html'; 
            }
        }

        function cambiarEntrenamiento() {
            localStorage.removeItem('token_hex');
            window.location.href = 'index.html'; 
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function iniciarEntrenamiento(nivel, plan) {
            localStorage.setItem('nivel_actual', nivel);
            localStorage.setItem('plan_actual', plan);
            window.location.href = 'examen.html';
        }

        // Arrancamos el motor
        window.onload = cargarDashboard;
    </script>
</body>
</html>
