<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Exámenes | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-12 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500">Mis Entrenamientos</h1>
                <p id="user-mail" class="text-slate-500 font-mono text-sm"></p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='index.html';" class="text-xs text-slate-500 hover:text-red-500 font-bold uppercase">Cerrar Sesión</button>
        </div>

        <div id="grid-cursos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const cursos = JSON.parse(localStorage.getItem('mis_cursos'));
        const userMail = localStorage.getItem('session_email');
        document.getElementById('user-mail').innerText = userMail;

        const container = document.getElementById('grid-cursos');

        if(cursos) {
            cursos.forEach(reg => {
                const conf = reg.config_examenes;
                const card = document.createElement('div');
                card.className = "bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-yellow-500 transition-all group";
                card.innerHTML = `
                    <div class="bg-black/40 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-yellow-500 transition-all">
                        <span class="text-2xl font-black text-yellow-500 group-hover:text-slate-900">${conf.institucion[0]}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">${conf.institucion}</h3>
                    <p class="text-slate-400 text-sm mb-6">Área: ${conf.area} - ${conf.plan}</p>
                    <a href="examen.html?v=${reg.token_hex}" class="block w-full bg-slate-800 hover:bg-yellow-500 hover:text-slate-900 text-center py-3 rounded-xl font-bold transition-all uppercase text-xs tracking-widest">Iniciar Simulador</a>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
