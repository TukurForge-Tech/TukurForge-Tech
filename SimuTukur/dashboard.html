<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="simu-telemetria.js"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a14; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .card-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }
        .color-cian { color: #00f2ff; }
        .btn-tab { border: 1px solid rgba(0, 242, 255, 0.2); transition: all 0.3s; cursor: pointer; color: white; }
        .btn-tab.active { background: #00f2ff; color: #050a14; border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; font-weight: 900; }
        .nivel-card { transition: transform 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .nivel-card:hover:not(.locked) { transform: scale(1.02); background: rgba(0, 242, 255, 0.05); border-color: #00f2ff; }
        .locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body>

    <header class="p-6 flex flex-col gap-4 border-b border-gray-800 bg-[#050a14]">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black italic color-cian tracking-tighter">SIMUTUKUR</h1>
            <button onclick="cerrarSesion()" class="text-red-500 font-bold hover:text-red-400 text-[10px] uppercase tracking-widest">Cerrar Sesión</button>
        </div>
        <div id="pestanas-cursos" class="flex gap-2 overflow-x-auto pb-1"></div>
    </header>

    <main class="grid grid-cols-12 h-[calc(100vh-140px)]">
        <aside class="col-span-3 border-r border-gray-800 p-6 flex flex-col bg-black/20">
            <h3 class="text-gray-500 font-bold text-[10px] uppercase tracking-widest mb-6 italic">Línea del Tiempo</h3>
            <div id="contenedor-historial" class="flex-grow overflow-y-auto space-y-3 pr-2"></div>
        </aside>

        <section class="col-span-6 p-8 flex flex-col h-full bg-[#050a14]">
            <div id="info-usuario" class="mb-6">
                <h2 id="saludo-alumno" class="text-3xl font-black italic tracking-tighter">Hola, <span class="color-cian italic">Cargando...</span></h2>
                <div id="plan-actual-container" class="mt-2"></div>
            </div>

            <div class="card-glass flex-grow flex flex-col overflow-hidden">
                <div class="p-3 border-b border-white/5 bg-white/5 flex items-center gap-3">
                    <img src="https://simutukur.tukurforge.com/logo_bho.png" class="w-6 h-6 rounded" alt="Simu">
                    <span class="text-[9px] font-black uppercase color-cian italic">Asistente IA Simu</span>
                </div>
                <div id="chat-box" class="flex-grow p-6 overflow-y-auto text-xs text-gray-300 space-y-4">
                    <p class="bg-gray-800/40 p-4 rounded-2xl rounded-tl-none border border-white/5 max-w-[85%]">
                        Sesión iniciada. Seleccione una pestaña superior para cargar el entrenamiento correspondiente.
                    </p>
                </div>
                <div class="p-4 border-t border-white/5 bg-black/40">
                    <div class="flex gap-2 bg-gray-900 border border-white/10 rounded-xl p-2">
                        <input type="text" id="user-input" placeholder="Pregunte algo a Simu..." class="bg-transparent flex-grow text-xs p-2 outline-none">
                        <button class="bg-cyan-600 p-2 px-4 rounded-lg text-[10px] font-bold uppercase">Enviar</button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="col-span-3 p-6 border-l border-gray-800 bg-black/20 overflow-y-auto">
            <h3 class="text-gray-500 font-bold text-[10px] uppercase tracking-widest mb-6 italic">Entrenamientos</h3>
            <div id="contenedor-niveles" class="space-y-4"></div>
        </aside>
    </main>

    <script>
        async function inicializarDashboard() {
            const email = localStorage.getItem('session_email');
            if (!email) { window.location.href = 'index.html'; return; }

            try {
                const { data: suscripciones, error } = await _supabase
                    .from('usuarios_membresias')
                    .select('*, config_examenes(*)')
                    .eq('email', email);

                if (error || !suscripciones || suscripciones.length === 0) {
                    document.getElementById('pestanas-cursos').innerHTML = "<p class='text-xs text-red-500 font-bold uppercase'>Error de vinculación.</p>";
                    return;
                }

                const contenedorTabs = document.getElementById('pestanas-cursos');
                contenedorTabs.innerHTML = "";

                suscripciones.forEach((s, index) => {
                    const nombreTab = s.config_examenes.area ? `${s.config_examenes.institucion} ${s.config_examenes.area}` : s.config_examenes.institucion;
                    const btn = document.createElement('button');
                    btn.className = `btn-tab px-5 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap`;
                    btn.innerText = nombreTab;
                    btn.onclick = () => seleccionarCurso(s, btn);
                    contenedorTabs.appendChild(btn);
                    if (index === 0) seleccionarCurso(s, btn);
                });
            } catch (err) { console.error(err); }
        }

        async function seleccionarCurso(data, btn) {
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const nombrePlan = data.config_examenes.area ? `${data.config_examenes.institucion} ${data.config_examenes.area}` : data.config_examenes.institucion;
            document.getElementById('saludo-alumno').innerHTML = `Hola, <span class="color-cian italic">${data.nombre_alumno}</span>`;
            localStorage.setItem('nombre_alumno', data.nombre_alumno);

            const esPro = data.config_examenes.plan === 'PRO';
            document.getElementById('plan-actual-container').innerHTML = `
                <p class="text-[10px] uppercase font-bold text-gray-500 italic tracking-widest">
                    Plan Activo: <span class="text-white">${nombrePlan}</span> 
                    <span class="ml-2 px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 font-black">
                        ${esPro ? 'MEMBRESÍA PRO (ILIMITADA)' : `PLAN BÁSICO (${data.intentos_simulacro_restantes} RESTANTES)`}
                    </span>
                </p>
            `;
            
            localStorage.setItem('token_hex_hijo', data.token_hex);
            localStorage.setItem('plan_actual', nombrePlan);
            localStorage.setItem('es_pro', esPro);

            cargarHistorial(data.token_hex);
            cargarNiveles(nombrePlan);
        }

        async function cargarHistorial(token) {
            const contenedor = document.getElementById('contenedor-historial');
            
            // Consulta usando fecha_aplicacion para el orden
            const { data, error } = await _supabase.from('resultados_examenes')
                .select('*')
                .eq('token_hex', token)
                .order('fecha_aplicacion', { ascending: false });
        
            if (error || !data || data.length === 0) {
                contenedor.innerHTML = `<div class="card-glass p-4 text-[9px] text-gray-500 italic border-dashed text-center">Sin actividad registrada.</div>`;
                return;
            }
            
            contenedor.innerHTML = data.map(reg => `
                <div class="card-glass p-3 border-l-2 border-cyan-500 bg-white/5 transition-all hover:bg-white/10">
                    <div class="flex justify-between items-center text-[8px] mb-1">
                        <span class="text-cyan-400 font-black uppercase tracking-tighter">${reg.tipo_prueba}</span>
                        <span class="text-gray-600">${new Date(reg.fecha_aplicacion).toLocaleDateString()}</span>
                    </div>
                    <p class="text-lg font-black text-white">${reg.puntaje_obtenido}% <span class="text-[9px] text-gray-500 font-normal italic">Aciertos</span></p>
                </div>
            `).join('');
        }

        async function cargarNiveles(plan) {
            const { data } = await _supabase.from('reglas_simulador').select('*').eq('institucion', plan).order('id', { ascending: true });
            const contenedor = document.getElementById('contenedor-niveles');
            contenedor.innerHTML = data.map(n => {
                const isLocked = n.nivel !== 'Principiante';
                return `
                    <div class="card-glass p-4 nivel-card ${isLocked ? 'locked' : ''}" onclick="${isLocked ? '' : `irAlExamen('${n.nivel}', ${n.cantidad_preguntas}, ${n.tiempo_minutos})`}">
                        <div class="flex justify-between items-center mb-1">
                            <h4 class="color-cian font-bold text-[10px] uppercase italic tracking-tighter">${n.nivel}</h4>
                            <i class="fa-solid ${isLocked ? 'fa-lock' : 'fa-lock-open'} text-[8px] text-gray-700"></i>
                        </div>
                        <p class="text-sm font-black text-white">${n.cantidad_preguntas} Reactivos | ${n.tiempo_minutos} Min</p>
                    </div>`;
            }).join('');
        }

        function irAlExamen(nivel, q, t) {
            localStorage.setItem('simu_nivel', nivel);
            localStorage.setItem('simu_preguntas', q);
            localStorage.setItem('simu_tiempo', t);
            window.location.href = `examen.html?v=${localStorage.getItem('token_hex_hijo')}`; 
        }
        
        function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = inicializarDashboard;
    </script>
</body>
</html>
