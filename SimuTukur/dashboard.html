<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Operaciones | SimuTukur</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050a14] text-white font-sans h-screen overflow-hidden">

    <!-- Header / Selector de Cursos -->
    <header class="p-6 flex flex-col gap-4 border-b border-gray-800 bg-[#050a14]">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic text-cyan-500 tracking-tighter">SIMUTUKUR</h1>
            <button onclick="cerrarSesion()" class="text-red-500 font-bold hover:text-red-400 text-xs uppercase tracking-widest transition-colors">Cerrar Sesión</button>
        </div>
        <div id="pestanas-cursos" class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
            <!-- Se llenará con JS -->
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-12 h-[calc(100vh-140px)]">
        
        <!-- Área Izquierda: Asistente IA (Simu) -->
        <section class="col-span-1 md:col-span-9 flex flex-col h-full bg-[#0a1120]">
            <div class="flex-grow flex flex-col h-full">
                <div class="p-5 border-b border-white/5 flex items-center gap-3 bg-black/20">
                    <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
                    <span class="text-xs font-black uppercase text-cyan-500 italic tracking-widest">Asistente IA Simu</span>
                </div>
                
                <!-- Caja de Chat -->
                <div id="chat-box" class="flex-grow p-6 overflow-y-auto text-sm text-gray-300 space-y-6 scroll-smooth">
                    <!-- Los mensajes se inyectan por JS -->
                </div>

                <!-- Input de Chat -->
                <div class="p-5 border-t border-white/5 bg-black/40">
                    <div class="flex gap-3 bg-gray-900 border border-white/10 rounded-xl p-3 focus-within:border-cyan-500/50 transition-colors">
                        <input type="text" id="user-input" onkeypress="if(event.key === 'Enter') enviarMensajeUsuario()" placeholder="Pregunte algo a Simu sobre su desempeño..." class="bg-transparent flex-grow text-sm p-2 outline-none text-white placeholder-gray-600">
                        <button onclick="enviarMensajeUsuario()" class="bg-cyan-600 p-3 px-8 rounded-lg text-xs font-black uppercase tracking-wider hover:bg-cyan-500 transition-colors shadow-lg shadow-cyan-900/50">Enviar</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Área Derecha: Entrenamientos / Niveles -->
        <aside class="col-span-1 md:col-span-3 p-6 border-l border-gray-800 bg-black/20 overflow-y-auto">
            <h3 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-6 italic">Entrenamientos</h3>
            <div id="contenedor-niveles" class="space-y-5">
                <!-- Se llenará con JS -->
            </div>
        </aside>
    </main>

    <!-- Supabase Client Setup -->
    <script src="supabase-client.js"></script> 
    <script src="simu-telemetria.js"></script>
    <!-- Lógica del Dashboard -->
    <script src="dashboard.js"></script>
    
    <script>
        // Si no tienes supa-config.js separado, asegúrate de inicializar window._supabase aquí
        // window._supabase = supabase.createClient("TU_URL", "TU_ANON_KEY");
        window.onload = inicializarDashboard;
    </script>
</body>
</html>
