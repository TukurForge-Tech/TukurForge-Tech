<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuTukur | UNAM Área 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Pantalla de Carga con tu Logo MP4/GIF */
        #loader {
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .logo-animado { width: 200px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col md:flex-row">

    <div id="loader">
        <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.mp4" class="logo-animado" alt="Cargando...">
        <p class="text-yellow-500 font-mono animate-pulse">PREPARANDO ENTORNO SEGURO...</p>
    </div>

    <aside class="w-full md:w-80 bg-slate-800 p-6 border-r border-slate-700 flex flex-col items-center gap-6">
        <div class="text-center w-full">
            <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.jpeg" alt="SimuTukur" class="w-20 mx-auto mb-2">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-wider">SimuTukur ⚜️</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">UNAM ÁREA 4</p>
        </div>

        <div class="w-full aspect-video bg-black rounded-xl overflow-hidden border-2 border-red-600/50 relative">
            <video id="webcam" autoplay muted class="w-full h-full object-cover"></video>
            <div class="absolute top-2 right-2 flex items-center gap-1">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] font-bold text-red-500">SUPERVISIÓN ACTIVA</span>
            </div>
        </div>

        <div class="w-full p-4 bg-slate-900 rounded-xl text-center border border-yellow-600/20">
            <span id="timer" class="text-3xl font-mono text-yellow-500">03:00:00</span>
            <p class="text-[10px] text-slate-500 uppercase mt-1">Tiempo Restante</p>
        </div>

        <button onclick="abortarExamen()" class="w-full py-2 bg-red-900/30 text-red-500 border border-red-500/50 rounded-lg text-xs font-bold hover:bg-red-500 hover:text-white transition-all">
            ABORTAR EXAMEN
        </button>
    </aside>

    <main class="flex-1 p-4 md:p-10">
        <div id="quiz-card" class="max-w-3xl mx-auto bg-slate-800 rounded-2xl p-8 border border-slate-700 shadow-2xl relative">
            
            <div class="flex justify-between items-center mb-6">
                <div class="flex gap-2">
                    <span id="badge-materia" class="bg-yellow-600/20 text-yellow-500 text-[10px] font-bold px-3 py-1 rounded-full border border-yellow-600/50">CARGANDO...</span>
                    <span class="bg-indigo-600/20 text-indigo-400 text-[10px] font-bold px-3 py-1 rounded-full border border-indigo-600/50">UNAM ÁREA 4</span>
                </div>
                <span class="text-slate-500 text-xs italic">Nivel: Principiante</span>
            </div>

            <h2 id="txt-pregunta" class="text-2xl font-medium mb-8 leading-relaxed text-slate-100 italic">
                Cargando reactivo...
            </h2>

            <div id="opciones-grid" class="grid grid-cols-1 gap-4"></div>

            <div class="mt-10 flex justify-between items-center border-t border-slate-700 pt-6">
                <p class="text-slate-500 text-sm font-mono">Pregunta <span id="current-count">0</span>/120</p>
                <button id="btn-next" onclick="fetchNextQuestion()" class="hidden bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-extrabold py-3 px-10 rounded-xl transition-all">
                    SIGUIENTE
                </button>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://pcuopqvmucmhtcdeswxh.supabase.co";
        const SUPABASE_KEY = "TU_ANON_KEY"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let questionsBank = [];
        let currentIndex = 0;
        let timeLeft = 3 * 60 * 60; // 3 horas

        // 1. CONTROL DEL TIEMPO
        function startTimer() {
            const timerElement = document.getElementById('timer');
            const interval = setInterval(() => {
                const h = Math.floor(timeLeft / 3600);
                const m = Math.floor((timeLeft % 3600) / 60);
                const s = timeLeft % 60;
                timerElement.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    alert("Tiempo agotado socio.");
                    finalizarExamen();
                }
                timeLeft--;
            }, 1000);
        }

        // 2. OBTENER TODAS LAS PREGUNTAS (120) AL INICIO
        async function loadExam() {
            const { data, error } = await _supabase
                .from('reactivos')
                .select('*')
                .eq('institucion', 'UNAM')
                .eq('tipo_examen', 'A4');

            if (data) {
                // Mezclar preguntas aleatoriamente
                questionsBank = data.sort(() => Math.random() - 0.5).slice(0, 120);
                document.getElementById('loader').style.display = 'none';
                startTimer();
                renderQuestion();
            }
        }

        function renderQuestion() {
            const q = questionsBank[currentIndex];
            document.getElementById('txt-pregunta').innerText = q.pregunta;
            document.getElementById('badge-materia').innerText = q.materia.toUpperCase();
            document.getElementById('current-count').innerText = currentIndex + 1;
            document.getElementById('btn-next').classList.add('hidden');

            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = '';

            // Mezclar opciones para que no siempre la A sea la misma
            const opcionesEntries = Object.entries(q.opciones).sort(() => Math.random() - 0.5);

            opcionesEntries.forEach(([letra, texto]) => {
                const btn = document.createElement('button');
                btn.className = "flex items-center p-4 bg-slate-700/30 border border-slate-600 rounded-xl hover:border-yellow-500 transition-all text-left";
                btn.innerHTML = `<span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-900 text-yellow-500 font-bold mr-4">${letra}</span><span class="text-sm">${texto}</span>`;
                btn.onclick = () => {
                    // Seleccionar opción y mostrar botón siguiente sin feedback (Modo Examen)
                    document.querySelectorAll('#opciones-grid button').forEach(b => b.classList.remove('border-yellow-500', 'bg-slate-700'));
                    btn.classList.add('border-yellow-500', 'bg-slate-700');
                    document.getElementById('btn-next').classList.remove('hidden');
                };
                grid.appendChild(btn);
            });
        }

        function fetchNextQuestion() {
            if (currentIndex < questionsBank.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                finalizarExamen();
            }
        }

        function abortarExamen() {
            if(confirm("¿Seguro socio? Se perderá el progreso.")) location.reload();
        }

        function finalizarExamen() {
            document.getElementById('quiz-card').innerHTML = `<h2 class="text-3xl text-center text-yellow-500 font-bold">Examen Finalizado</h2><p class="text-center mt-4">Procesando resultados con IA TukurForge...</p>`;
        }

        // Iniciar
        loadExam();
        // (Agrega tu función initMedia() aquí para la cámara)
    </script>
</body>
</html>
