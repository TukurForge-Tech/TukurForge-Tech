<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Unificado | TukurForge Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <style>
        #splash-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .login-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); }
        .eye-btn { position: absolute; top: 50%; right: 15px; transform: translateY(-50%); }
    </style>
</head>
<body class="bg-[#050914] text-white min-h-screen flex items-center justify-center p-6">

    <div id="splash-screen" class="hidden">
        <video id="splash-video" class="w-full max-w-lg rounded-3xl shadow-2xl shadow-cyan-500/20" muted playsinline>
            <source src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.mp4" type="video/mp4">
        </video>
    </div>

    <div class="max-w-md w-full login-card p-10 rounded-3xl border border-slate-800 shadow-2xl text-center relative" id="login-box">
        <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur.jpeg" alt="Logo" class="w-24 mx-auto mb-10 rounded-xl">
        
        <h1 class="text-3xl font-bold text-slate-100 mb-2 tracking-tight">Portal de Acceso</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mb-10 font-bold italic">Sincronización TukurForge</p>

        <form id="login-form" class="space-y-4">
            <input type="email" id="email" placeholder="Correo Electrónico" required class="w-full bg-black/60 border border-slate-700 p-4 rounded-xl text-center outline-none focus:border-cyan-500 transition-all">
            
            <div class="relative w-full">
                <input type="password" id="pass" placeholder="Contraseña" required class="w-full bg-black/60 border border-slate-700 p-4 rounded-xl text-center outline-none focus:border-cyan-500 text-cyan-400 font-mono tracking-widest">
                <button type="button" id="togglePassword" class="eye-btn text-slate-600 hover:text-cyan-500 transition-colors">👁️</button>
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-cyan-500/20 uppercase tracking-widest text-xs">
                INICIAR ENTRENAMIENTO
            </button>
        </form>
        
        <a href="#" class="block text-[9px] text-slate-600 mt-6 hover:text-cyan-500 uppercase tracking-widest font-bold transition-colors">¿Olvidaste tu contraseña?</a>
        <p id="msg" class="text-red-500 text-xs mt-6 font-bold"></p>

        <div class="mt-12 pt-6 border-t border-slate-800 text-center text-[9px] text-slate-700">
            <p>Desarrollado por <strong>TukurForge Tech</strong></p>
            <p>División Tecnológica de <strong>H Levare Group</strong></p>
            <p class="mt-2 text-slate-800 italic">© 2026. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        // La variable "_supabase" ya viene de supabase-client.js
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('pass');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.innerText = type === 'password' ? '👁️' : '🔒';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailValue = document.getElementById('email').value.trim();
            const passValue = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg');

            msg.innerText = "Validando acceso en la red...";
            msg.style.color = "#22d3ee";

            try {
                // Consultamos al usuario
                const { data, error } = await _supabase
                    .from('usuarios_membresias')
                    .select('*')
                    .eq('email', emailValue);

                if (error) throw error;

                if (data && data.length > 0) {
                    // Buscamos coincidencia de contraseña
                    const match = data.find(u => u.password_hijo === passValue || u.password_padre === passValue);

                    if (match) {
                        // 🛡️ CORRECCIÓN CLAVE: Guardar las variables que el Dashboard espera
                        localStorage.setItem('token_hex', match.token_hex);
                        localStorage.setItem('nombre_alumno', match.nombre_alumno);
                        localStorage.setItem('session_email', emailValue); // Por si se ocupa
                        
                        // EFECTO SPLASH
                        document.getElementById('login-box').classList.add('hidden');
                        const splash = document.getElementById('splash-screen');
                        const video = document.getElementById('splash-video');
                        splash.classList.remove('hidden');
                        video.play();
                        
                        // Redirección al terminar el video
                        video.onended = () => { window.location.href = 'dashboard.html'; };
                    } else {
                        msg.innerText = "Contraseña incorrecta";
                        msg.style.color = "#ef4444";
                    }
                } else {
                    msg.innerText = "Usuario no registrado.";
                    msg.style.color = "#ef4444";
                }
            } catch (err) {
                console.error("Detalle del error técnico:", err);
                msg.innerText = "Error de red. Verifica conexión.";
                msg.style.color = "#f59e0b";
            }
        });
    </script>
</body>
</html>
