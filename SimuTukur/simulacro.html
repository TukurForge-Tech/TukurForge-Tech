<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Simulacro ECOEMS | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-black/80 border border-cyan-500/30 p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-cyan-500/20 blur-[50px] rounded-full pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg" alt="SimuTukur" class="w-16 h-16 mx-auto rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.5)] mb-4">
            <h1 class="text-3xl font-black italic tracking-tighter text-cyan-400 uppercase">Gran Simulacro</h1>
            <h2 class="text-xl font-bold text-gray-300">Nivel Medio Superior (ECOEMS)</h2>
            <p class="text-sm text-gray-400 mt-3">Pon a prueba a tu hijo con Proctoring e Inteligencia Artificial en vivo. <span class="text-cyan-400 font-bold">Cupo limitado a 100 lugares.</span></p>
        </div>

        <form id="formSimulacro" class="space-y-5 relative z-10">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Tu Nombre (Padre/Tutor)</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-3 text-cyan-500"></i>
                    <input type="text" id="nombreTutor" required class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg pl-10 pr-4 py-2.5 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition" placeholder="Ej. Juan Pérez">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Tu Correo Electrónico</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-3 top-3 text-cyan-500"></i>
                    <input type="email" id="correoTutor" required class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg pl-10 pr-4 py-2.5 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition" placeholder="correo@ejemplo.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Elige tu horario</label>
                <div class="relative">
                    <i class="fa-solid fa-calendar absolute left-3 top-3 text-cyan-500"></i>
                    <select id="diaElegido" required class="w-full bg-gray-800 border border-gray-700 text-white text-sm rounded-lg pl-10 pr-4 py-2.5 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none appearance-none cursor-pointer">
                        <option value="" disabled selected>Selecciona una sesión...</option>
                        <option value="Sabado_10AM">Sábado - 10:00 AM</option>
                        <option value="Domingo_10AM">Domingo - 10:00 AM</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="btnRegistro" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black italic tracking-widest py-3 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.4)] transition transform hover:-translate-y-0.5 mt-4">
                <i class="fa-solid fa-bolt mr-2"></i> RESERVAR MI LUGAR
            </button>
        </form>

        <div id="mensajeExito" class="hidden text-center mt-6">
            <i class="fa-solid fa-circle-check text-4xl text-green-400 mb-2"></i>
            <h3 class="text-lg font-bold text-white">¡Lugar Reservado!</h3>
            <p class="text-sm text-gray-400 mt-2">Te enviaremos la liga oficial de Google Meet a tu correo este <span class="text-cyan-400 font-bold">viernes</span>. ¡Mantente atento a tu bandeja de entrada!</p>
        </div>
    </div>

   <script src="supabase-client.js"></script>

    <script>
        document.getElementById('formSimulacro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegistro');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Registrando...';
            btn.disabled = true;

            const nombre = document.getElementById('nombreTutor').value;
            const correo = document.getElementById('correoTutor').value;
            const dia = document.getElementById('diaElegido').value;

            try {
                // Usamos _supabase que ya viene de tu archivo supabase-client.js
                const { error } = await _supabase.from('prospectos_simulacro').insert([
                    { nombre_tutor: nombre, correo: correo, dia_elegido: dia }
                ]);

                if (error) throw error;

                // Muestra éxito
                document.getElementById('formSimulacro').classList.add('hidden');
                document.getElementById('mensajeExito').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("Hubo un error o el correo ya está registrado.");
                btn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> RESERVAR MI LUGAR';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
