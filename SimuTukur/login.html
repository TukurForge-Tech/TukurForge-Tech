<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Unificado | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    
    <div class="fixed inset-0 bg-[#050a14] z-[9999] flex flex-col justify-center items-center p-8 text-center lg:hidden">
        <i class="fa-solid fa-laptop-code text-5xl text-cyan-500 mb-6"></i>
        <h2 class="text-2xl font-black italic uppercase tracking-tighter text-white mb-2">Entorno Restringido</h2>
        <p class="text-sm text-gray-400 mb-4 max-w-xs leading-relaxed">SimuTukur requiere un entorno de escritorio para la telemetría y el Tutor IA. Por favor, ingresa desde una <strong class="text-cyan-400">Computadora o Laptop</strong>.</p>
    </div>

    <div id="login-box" class="card-glass w-full max-w-md p-8 md:p-10 relative overflow-hidden hidden lg:block bg-gray-900">
        <div class="text-center mb-10">
            <img src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/SimuTukur2.jpeg" class="w-16 h-16 mx-auto rounded-xl border border-cyan-500/30 mb-4" alt="Simu Logo">
            <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Acceso <span class="text-cyan-400">Aspirantes</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest mt-2 font-bold">Ingresa tus credenciales</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Usuario (Correo Electrónico)</label>
                <input type="email" id="email" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-4 text-sm text-white outline-none focus:border-cyan-500 transition" placeholder="ejemplo@correo.com">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-4 pr-12 text-sm text-white outline-none focus:border-cyan-500 transition">
                    <i class="fa-solid fa-eye password-toggle absolute right-4 top-4" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" id="btnIngresar" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl transition uppercase tracking-widest text-sm shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                Iniciar Sesión
            </button>
            <p id="msg" class="text-center text-xs mt-4 font-bold tracking-widest uppercase h-4"></p>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <a href="registro.html" class="text-xs text-gray-500 hover:text-white uppercase font-bold tracking-widest transition">¿No tienes cuenta? <span class="text-cyan-400">Inscríbete aquí</span></a>
        </div>
    </div>

    <div id="splash-screen" class="hidden flex-col">
        <video id="splash-video" width="100%" height="100%" muted playsinline style="object-fit: cover; max-width: 100vw; max-height: 100vh;">
            <source src="https://echyplrboxmckxljtkgg.supabase.co/storage/v1/object/public/assets/SimuTukur/Intro2.mp4" type="video/mp4">
        </video>
        <p class="absolute bottom-10 text-cyan-500 text-xs uppercase tracking-widest font-bold animate-pulse">Iniciando Biometría y Tutor IA...</p>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="login.js"></script>
</body>
</html>
