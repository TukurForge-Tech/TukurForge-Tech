<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comando Central | SimuTukur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#050a14] text-white p-10 font-sans">
    <div class="max-w-2xl mx-auto bg-black/50 border border-slate-800 p-8 rounded-3xl text-center">
        <i class="fa-solid fa-satellite-dish text-6xl text-cyan-500 mb-6 animate-pulse"></i>
        <h1 class="text-3xl font-black italic uppercase text-cyan-400 mb-2">Control Maestro Piloto</h1>
        <p class="text-gray-500 mb-8 uppercase text-xs tracking-widest">Estado actual: <span id="lbl_estado" class="text-white font-bold">CARGANDO...</span></p>
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="cambiarEstado('en_curso')" class="bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl uppercase shadow-[0_0_15px_rgba(22,163,74,0.4)]">
                <i class="fa-solid fa-play mr-2"></i> Iniciar Examen Global
            </button>
            <button onclick="cambiarEstado('finalizado')" class="bg-red-600 hover:bg-red-500 text-white font-black py-4 rounded-xl uppercase shadow-[0_0_15px_rgba(220,38,38,0.4)]">
                <i class="fa-solid fa-stop mr-2"></i> Finalizar y Liberar Dash
            </button>
        </div>
    </div>

    <script src="supabase-client.js"></script>
    <script>
        async function cambiarEstado(nuevoEstado) {
            await _supabase.from('control_simulacro').update({ estado: nuevoEstado }).eq('id', 1);
            document.getElementById('lbl_estado').innerText = nuevoEstado.toUpperCase();
            alert(`El examen ha cambiado a: ${nuevoEstado.toUpperCase()}`);
        }
        
        // Cargar estado inicial
        window.onload = async () => {
            const { data } = await _supabase.from('control_simulacro').select('estado').eq('id', 1).single();
            if(data) document.getElementById('lbl_estado').innerText = data.estado.toUpperCase();
        };
    </script>
</body>
</html>
